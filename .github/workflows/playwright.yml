name: Test

on:
  # run workflow manually
  workflow_dispatch:
    inputs:
      browser:
        type: choice
        description: Which browser to test
        required: true
        options:
          - chromium
          - firefox
          - webkit

  # trigger: push new changes
  push:
    branches: [main]

jobs:
  start:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      USER_ID_1: ${{ secrets.USER_ID_1 }}
      PASSWORD_1: ${{ secrets.PASSWORD_1 }}
      USER_ID_2: ${{ secrets.USER_ID_2 }}
      PASSWORD_2: ${{ secrets.PASSWORD_2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run bddgen
        run: npx bddgen

      - name: Run Playwright tests
        run: npx playwright test --browser ${{ github.event.inputs.browser || 'chromium' }}

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
